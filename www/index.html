<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#667eea">
    <title>Hadoku Task</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
